<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Админ-панель</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-stone-100 p-10">
  <div class="max-w-2xl mx-auto">
    <h1 class="text-3xl font-bold mb-8 italic">Входящие заказы</h1>
    
    <div id="admin-list" class="space-y-4">
      <!-- Сюда упадет заказ -->
    </div>
  </div>

  <script>
    function loadAdmin() {
      const list = document.getElementById('admin-list');
      const order = JSON.parse(localStorage.getItem('activeOrder'));

      if (order) {
        list.innerHTML = `
          <div class="bg-white p-6 rounded-2xl shadow-sm border">
            <div class="flex justify-between items-start">
              <div>
                <span class="text-xs font-bold text-stone-400">№${order.id} | ${order.date}</span>
                <h2 class="text-xl font-bold">${order.item}</h2>
                <p class="text-gray-500 text-sm italic">${order.details}</p>
              </div>
              <select onchange="updateStatus(this.value)" class="border rounded-lg p-2 text-sm font-bold">
                <option ${order.status === 'Новый' ? 'selected' : ''}>Ожидание</option>
                <option ${order.status === 'В работе' ? 'selected' : ''}>В работе</option>
                <option ${order.status === 'Готов' ? 'selected' : ''}>Готов</option>
              </select>
            </div>
            <button onclick="clearOrder()" class="mt-4 text-xs text-red-400 underline">Удалить/Завершить</button>
          </div>
        `;
      } else {
        list.innerHTML = '<p class="text-gray-400 italic">Новых заказов нет.</p>';
      }
    }

    function updateStatus(newStatus) {
      const order = JSON.parse(localStorage.getItem('activeOrder'));
      order.status = newStatus;
      localStorage.setItem('activeOrder', JSON.stringify(order));
      alert('Статус изменен на: ' + newStatus);
    }

    function clearOrder() {
      if(confirm('Удалить заказ?')) {
        localStorage.removeItem('activeOrder');
        location.reload();
      }
    }

    window.onload = loadAdmin;
  </script>
</body>
</html>
