<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const supabaseUrl = 'https://oppgphqoyajcscyjnuvc.supabase.co';
        const supabaseKey = 'sb_publishable_5BioP4yWmd2btjG6SXbU_w_trFj4wdF';
        const supabase = supabaseJs.createClient(supabaseUrl, supabaseKey);
    </script>
</head>
<body class="p-8 bg-white font-sans">
    <div class="max-w-4xl mx-auto">
        <a href="services.html" class="text-[10px] font-black text-gray-300 hover:text-black tracking-[0.2em]">← НАЗАД К УСЛУГАМ</a>
        <h1 class="text-4xl font-bold mt-8 italic">Мягкая <span class="text-[#b68b5c]">мебель</span></h1>
        
        <div class="mt-12 bg-stone-50 rounded-[40px] p-8 border border-stone-100 md:flex gap-12 items-center">
            <div class="w-full md:w-1/2 h-64 bg-stone-200 rounded-[30px] mb-6 md:mb-0"></div>
            <div class="w-full md:w-1/2">
                <h2 class="text-2xl font-bold italic mb-4">Диван "Лион"</h2>
                <div class="mb-6">
                    <label class="text-[10px] font-black text-stone-400 uppercase">Выбор ткани</label>
                    <select id="detail" class="w-full mt-2 p-4 rounded-2xl border-none shadow-sm text-sm">
                        <option>Велюр (Италия)</option>
                        <option>Рогожка</option>
                        <option>Замша</option>
                    </select>
                </div>
                <button onclick="order('Диван Лион')" class="w-full bg-black text-white py-5 rounded-full font-bold shadow-lg hover:scale-[1.02] transition">ЗАКАЗАТЬ</button>
            </div>
        </div>
    </div>
    <script>
        async function order(name) {
            const detail = document.getElementById('detail').value;
            const num = Math.floor(Math.random() * 9000) + 1000;
            const { error } = await supabase.from('orders').insert([{ order_num: num, item_name: name, details: "Ткань: "+detail, status: 'Новый' }]);
            if (!error) { alert('Заказ №'+num+' оформлен!'); window.location.href='index.html'; }
        }
    </script>
</body>
</html>
