<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Мастерская мебели</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    html { scroll-behavior: smooth; }
    body { font-family: 'Inter', sans-serif; background-color: #fff; }
    .wood-text { color: #b68b5c; }
    #order-info { display: none; position: fixed; top: 80px; right: 20px; z-index: 100; width: 320px; background: white; border-radius: 20px; box-shadow: 0 20px 40px rgba(0,0,0,0.15); padding: 20px; border: 1px solid #eee; }
  </style>
</head>
<body>

  <header class="sticky top-0 z-50 bg-white/80 backdrop-blur-md border-b">
    <div class="max-w-7xl mx-auto flex items-center justify-between px-6 py-4">
      <span class="text-2xl font-bold italic">Мастер<span class="wood-text">.</span>Мебель</span>
      <nav class="flex items-center gap-6">
        <a href="#gallery" class="text-sm font-bold hover:wood-text transition">РАБОТЫ</a>
        <button onclick="toggleOrders()" class="relative p-2 bg-gray-100 rounded-full">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"/></svg>
          <span id="badge" class="hidden absolute -top-1 -right-1 w-3 h-3 bg-amber-500 rounded-full border-2 border-white"></span>
        </button>
      </nav>
    </div>
  </header>

  <!-- Окно заказов -->
  <div id="order-info">
    <h3 class="font-bold mb-4 italic text-lg">Статус заказа</h3>
    <div id="client-order-view" class="space-y-3">
      <p class="text-gray-400 text-sm italic">У вас пока нет активных заказов.</p>
    </div>
    <button onclick="toggleOrders()" class="mt-4 w-full text-xs text-gray-400 underline">Закрыть</button>
  </div>

  <main>
    <section class="py-24 text-center px-4">
      <h1 class="text-5xl md:text-7xl font-bold mb-8 italic tracking-tighter">Создаем уют <br> <span class="wood-text">с характером</span></h1>
      <a href="services.html" class="inline-block bg-black text-white px-10 py-4 rounded-full font-bold hover:scale-105 transition shadow-xl">Смотреть услуги</a>
    </section>

    <!-- Карточки без кнопок -->
    <section class="max-w-7xl mx-auto px-6 grid grid-cols-1 md:grid-cols-3 gap-8 mb-24">
      <div class="group">
        <div class="h-80 bg-gray-100 rounded-3xl mb-4 overflow-hidden"><div class="w-full h-full bg-[url('your-photo-1.jpg')] bg-cover bg-center group-hover:scale-105 transition duration-500"></div></div>
        <h3 class="text-xl font-bold italic">Реставрация</h3>
        <p class="text-gray-400 text-sm italic">Вторая жизнь вашей любимой мебели</p>
      </div>
      <div class="group">
        <div class="h-80 bg-gray-100 rounded-3xl mb-4 overflow-hidden"><div class="w-full h-full bg-[url('your-photo-2.jpg')] bg-cover bg-center group-hover:scale-105 transition duration-500"></div></div>
        <h3 class="text-xl font-bold italic">Мягкая мебель</h3>
        <p class="text-gray-400 text-sm italic">Индивидуальный пошив и формы</p>
      </div>
      <div class="group">
        <div class="h-80 bg-gray-100 rounded-3xl mb-4 overflow-hidden"><div class="w-full h-full bg-[url('your-photo-3.jpg')] bg-cover bg-center group-hover:scale-105 transition duration-500"></div></div>
        <h3 class="text-xl font-bold italic">Корпусная мебель</h3>
        <p class="text-gray-400 text-sm italic">Кухни и шкафы по вашим размерам</p>
      </div>
    </section>

    <section id="gallery" class="py-20 bg-stone-50 px-6">
        <h2 class="text-center text-3xl font-bold mb-12 italic">Галерея работ</h2>
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 max-w-7xl mx-auto">
            <div class="aspect-square bg-gray-200 rounded-2xl"></div>
            <div class="aspect-square bg-gray-200 rounded-2xl"></div>
            <div class="aspect-square bg-gray-200 rounded-2xl"></div>
            <div class="aspect-square bg-gray-200 rounded-2xl"></div>
        </div>
    </section>
  </main>

  <script>
    function toggleOrders() {
      const box = document.getElementById('order-info');
      box.style.display = box.style.display === 'block' ? 'none' : 'block';
      renderOrder();
    }

    function renderOrder() {
      const view = document.getElementById('client-order-view');
      const badge = document.getElementById('badge');
      const order = JSON.parse(localStorage.getItem('activeOrder'));
      
      if (order) {
        badge.classList.remove('hidden');
        view.innerHTML = `
          <div class="p-4 bg-stone-50 rounded-xl border border-stone-200">
            <p class="text-[10px] font-black text-stone-400 uppercase">Заказ №${order.id || '---'}</p>
            <p class="font-bold my-1">${order.item}</p>
            <p class="text-xs italic text-gray-500 mb-3">${order.details}</p>
            <div class="flex items-center gap-2">
              <span class="w-2 h-2 rounded-full ${order.status === 'Готов' ? 'bg-green-500' : 'bg-amber-500'}"></span>
              <span class="text-[10px] font-bold uppercase tracking-widest">${order.status || 'Обработка'}</span>
            </div>
          </div>
        `;
      }
    }
    window.onload = renderOrder;
  </script>
</body>
</html>
