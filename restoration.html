<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const supabaseUrl = 'https://oppgphqoyajcscyjnuvc.supabase.co';
        const supabaseKey = 'sb_publishable_5BioP4yWmd2btjG6SXbU_w_trFj4wdF';
        const supabase = supabaseJs.createClient(supabaseUrl, supabaseKey);
    </script>
</head>
<body class="p-8 bg-stone-50 font-sans">
    <div class="max-w-3xl mx-auto">
        <a href="services.html" class="text-[10px] font-black text-gray-400 tracking-widest">← К УСЛУГАМ</a>
        <h1 class="text-3xl font-bold mt-10 mb-10 italic">Реставрация и <span class="text-[#b68b5c]">ремонт</span></h1>
        
        <div class="bg-white rounded-3xl p-8 shadow-sm border border-stone-200">
            <div class="grid grid-cols-2 gap-4 h-48 mb-6">
                <div class="bg-stone-100 rounded-xl flex items-center justify-center italic text-stone-400 text-xs">ДО</div>
                <div class="bg-stone-200 rounded-xl flex items-center justify-center italic text-stone-600 text-xs font-bold">ПОСЛЕ</div>
            </div>
            <h2 class="text-xl font-bold mb-4">Полное восстановление кресла</h2>
            <p class="text-gray-400 text-sm mb-6 italic italic leading-relaxed">Включает замену пружинного блока, перетяжку и реставрацию деревянных элементов.</p>
            <button onclick="order('Реставрация кресла')" class="w-full bg-[#b68b5c] text-white py-4 rounded-full font-bold shadow-md">ВЫЗВАТЬ МАСТЕРА НА ОЦЕНКУ</button>
        </div>
    </div>
    <script>
        async function order(name) {
            const num = Math.floor(Math.random() * 9000) + 1000;
            const { error } = await supabase.from('orders').insert([{ order_num: num, item_name: name, details: "Запрос на реставрацию", status: 'Новый' }]);
            if (!error) { alert('Мастер перезвонит вам!'); window.location.href='index.html'; }
        }
    </script>
</body>
</html>
