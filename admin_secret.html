<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Админ-панель заказов</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const supabaseUrl = 'https://oppgphqoyajcscyjnuvc.supabase.co';
        const supabaseKey = 'sb_publishable_5BioP4yWmd2btjG6SXbU_w_trFj4wdF';
        const supabase = supabaseJs.createClient(supabaseUrl, supabaseKey);
    </script>
</head>
<body class="bg-stone-100 p-6 md:p-12">
    <div class="max-w-4xl mx-auto">
        <h1 class="text-3xl font-bold mb-10 italic">Управление заказами</h1>
        <div id="admin-list" class="space-y-4 text-gray-400 italic">Загрузка заказов...</div>
    </div>

    <script>
        async function load() {
            const list = document.getElementById('admin-list');
            const { data, error } = await supabase.from('orders').select('*').order('created_at', { ascending: false });
            if (data) {
                list.innerHTML = data.map(o => `
                    <div class="bg-white p-6 rounded-3xl border flex justify-between items-center">
                        <div>
                            <span class="text-[10px] font-bold text-stone-300">№${o.order_num}</span>
                            <h2 class="font-bold text-black">${o.item_name}</h2>
                            <p class="text-xs text-gray-500">${o.details}</p>
                        </div>
                        <select onchange="upd(${o.order_num}, this.value)" class="bg-stone-50 p-2 rounded-lg text-xs font-bold border-none text-black">
                            <option ${o.status=='Новый'?'selected':''}>Новый</option>
                            <option ${o.status=='В работе'?'selected':''}>В работе</option>
                            <option ${o.status=='Готов'?'selected':''}>Готов</option>
                        </select>
                    </div>
                `).join('');
            }
        }
        async function upd(num, s) {
            const { error } = await supabase.from('orders').update({ status: s }).eq('order_num', num);
            if (!error) alert('Статус обновлен!');
        }
        window.onload = load;
    </script>
</body>
</html>
